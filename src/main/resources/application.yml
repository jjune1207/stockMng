server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: stock-chart
  cache:
    type: caffeine
  thymeleaf:
    cache: false
  lifecycle:
    timeout-per-shutdown-phase: 30s

naver:
  stock-basic-url: https://m.stock.naver.com/api/stock
  etf-basic-url: https://m.stock.naver.com/api/etf

cache:
  candle-ttl-minutes: 10
  price-ttl-seconds: 30

logging:
  level:
    com.example.stockchart: DEBUG
    org.springframework.web.reactive.function.client: WARN
