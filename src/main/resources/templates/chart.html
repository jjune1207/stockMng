<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">종목 차트</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-dark text-light" data-bs-theme="dark">

<nav class="navbar navbar-dark bg-black border-bottom border-secondary px-4">
    <a class="navbar-brand fw-bold" href="/">
        <i class="bi bi-bar-chart-fill text-warning me-2"></i>주식 분석 차트
    </a>
    <div class="d-flex align-items-center gap-2">
        <div class="input-group input-group-sm" style="width: 260px;">
            <input type="text" id="quickSearch" class="form-control bg-dark text-light border-secondary"
                   placeholder="종목 검색..." autocomplete="off">
        </div>
        <button class="btn btn-sm btn-outline-warning" id="themeToggle" onclick="toggleTheme()" title="테마 전환">
            <i class="bi bi-sun-fill"></i>
        </button>
        <a href="/" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>목록
        </a>
    </div>
</nav>

<!-- 빠른 검색 결과 -->
<div id="quickSearchResults" class="position-fixed bg-dark border border-secondary rounded"
     style="z-index: 2000; display: none; max-height: 300px; overflow-y: auto; top: 55px; right: 80px; width: 300px;">
</div>

<div class="container-fluid px-3 py-3">
    <div class="row g-3">

        <!-- 왼쪽: 차트 영역 -->
        <div class="col-lg-9">

            <!-- 종목 헤더 + 기간 탭 -->
            <div class="d-flex align-items-center justify-content-between mb-2 flex-wrap gap-2">
                <div>
                    <span id="stockName" class="fs-5 fw-bold me-2">로딩 중...</span>
                    <span id="stockSymbol" class="text-secondary font-monospace" th:text="${symbol}"></span>
                    <span id="stockType" class="badge bg-secondary ms-1 small"></span>
                </div>
                <div class="d-flex gap-2">
                    <div class="btn-group" role="group">
                        <button class="btn btn-outline-info timeframe-btn" data-tf="1">1분</button>
                        <button class="btn btn-outline-info timeframe-btn" data-tf="3">3분</button>
                        <button class="btn btn-outline-info timeframe-btn" data-tf="10">10분</button>
                        <button class="btn btn-outline-info timeframe-btn active" data-tf="day">일</button>
                    </div>
                    <div class="btn-group" role="group" id="periodBtnGroup">
                        <button class="btn btn-outline-secondary period-btn" data-days="22">1개월</button>
                        <button class="btn btn-outline-secondary period-btn active" data-days="66">3개월</button>
                        <button class="btn btn-outline-secondary period-btn" data-days="132">6개월</button>
                        <button class="btn btn-outline-secondary period-btn" data-days="252">1년</button>
                        <button class="btn btn-outline-secondary period-btn" data-days="504">2년</button>
                        <button class="btn btn-outline-secondary period-btn" data-days="0">전체</button>
                    </div>
                </div>
            </div>

            <!-- 지표 오버레이 체크박스 -->
            <div class="indicator-panel mb-2 d-flex flex-wrap gap-3 align-items-center">
                <small class="text-secondary fw-semibold">이동평균선</small>
                <div class="form-check form-check-inline mb-0">
                    <input class="form-check-input" type="checkbox" id="chkMA5">
                    <label class="form-check-label small" for="chkMA5" style="color:#ffeb3b">MA 5</label>
                </div>
                <div class="form-check form-check-inline mb-0">
                    <input class="form-check-input" type="checkbox" id="chkMA20">
                    <label class="form-check-label small" for="chkMA20" style="color:#4fc3f7">MA 20</label>
                </div>
                <div class="form-check form-check-inline mb-0">
                    <input class="form-check-input" type="checkbox" id="chkMA50" checked>
                    <label class="form-check-label small" for="chkMA50" style="color:#ff9800">MA 50</label>
                </div>
                <div class="form-check form-check-inline mb-0">
                    <input class="form-check-input" type="checkbox" id="chkMA100" checked>
                    <label class="form-check-label small" for="chkMA100" style="color:#2196f3">MA 100</label>
                </div>
                <div class="form-check form-check-inline mb-0">
                    <input class="form-check-input" type="checkbox" id="chkMA200" checked>
                    <label class="form-check-label small" for="chkMA200" style="color:#e91e63">MA 200</label>
                </div>
                <div class="vr mx-1"></div>
                <small class="text-secondary fw-semibold">오버레이</small>
                <div class="form-check form-check-inline mb-0">
                    <input class="form-check-input" type="checkbox" id="chkBollinger">
                    <label class="form-check-label small" for="chkBollinger" style="color:#4caf50">볼린저</label>
                </div>
            </div>

            <!-- 차트 컨테이너 -->
            <div id="chartContainer" class="position-relative">
                <div id="chartLoading">
                    <div class="text-center text-light">
                        <div class="spinner-border text-warning mb-2"></div>
                        <div class="small">차트 데이터 로딩 중...</div>
                    </div>
                </div>

                <div id="mainChart"></div>
                <div class="chart-divider"></div>
                <div id="volumeChart"></div>

            </div>

            <!-- 종합 매수/매도 분석 -->
            <div id="tradingAnalysisPanel" class="mt-3 card bg-dark border-secondary">
                <div class="card-header border-secondary d-flex justify-content-between align-items-center">
                    <span class="small fw-semibold" style="color:#ffc107">
                        <i class="bi bi-lightning-charge-fill me-1"></i>종합 매매 분석
                    </span>
                    <span id="tradingVerdict" class="badge fs-6"></span>
                </div>
                <div class="card-body" id="tradingAnalysisContent">
                    <div class="text-secondary small">차트 데이터 로딩 중...</div>
                </div>
            </div>

            <!-- MA 크로스 시그널 분석 -->
            <div id="analysisPanel" class="mt-3 card bg-dark border-secondary" style="display:none">
                <div class="card-header border-secondary small text-secondary fw-semibold">
                    <i class="bi bi-clipboard-data me-1"></i>이동평균선 분석
                </div>
                <div class="card-body" id="analysisContent"></div>
            </div>
        </div>

        <!-- 오른쪽: 정보 패널 -->
        <div class="col-lg-3">
            <div class="card bg-dark border-secondary">
                <div class="card-header border-secondary small text-secondary fw-semibold">현재 시세</div>
                <div class="card-body">
                    <div class="mb-3">
                        <div class="d-flex align-items-center justify-content-between mb-1">
                            <div class="info-label mb-0">현재가</div>
                            <div id="currencyToggleGroup" class="btn-group btn-group-sm" role="group" style="display:none">
                                <button class="btn btn-warning currency-toggle-btn active" data-cur="USD">$ USD</button>
                                <button class="btn btn-outline-warning currency-toggle-btn" data-cur="KRW">₩ 원화</button>
                            </div>
                        </div>
                        <div id="infoCurrentPrice" class="info-value fs-4">—</div>
                        <div id="infoPriceChange" class="small mt-1">—</div>
                    </div>
                    <hr class="border-secondary my-2">
                    <div class="row g-2">
                        <div class="col-6">
                            <div class="info-label">시가</div>
                            <div id="infoOpen" class="info-value small">—</div>
                        </div>
                        <div class="col-6">
                            <div class="info-label">종가</div>
                            <div id="infoClose" class="info-value small">—</div>
                        </div>
                        <div class="col-6">
                            <div class="info-label">고가</div>
                            <div id="infoHigh" class="info-value small price-up">—</div>
                        </div>
                        <div class="col-6">
                            <div class="info-label">저가</div>
                            <div id="infoLow" class="info-value small price-down">—</div>
                        </div>
                        <div class="col-12">
                            <div class="info-label">거래량</div>
                            <div id="infoVolume" class="info-value small">—</div>
                        </div>
                    </div>
                    <hr class="border-secondary my-2">
                    <div class="small text-secondary">데이터: 네이버 증권</div>
                    <div class="small text-secondary" id="infoCandleCount"></div>
                </div>
            </div>

            <!-- MA 현재값 패널 -->
            <div class="card bg-dark border-secondary mt-3">
                <div class="card-header border-secondary small text-secondary fw-semibold">
                    이동평균선 현재값
                </div>
                <div class="card-body" id="maValues">
                    <div class="text-secondary small">데이터 로딩 중...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    /* ── 테마 전환 ── */
    function getStoredTheme() { return localStorage.getItem('theme') || 'dark'; }

    function applyTheme(theme) {
        const isDark = theme === 'dark';
        const body = document.body;
        const nav = document.querySelector('nav');
        const icon = document.querySelector('#themeToggle i');

        body.setAttribute('data-bs-theme', theme);
        body.className = isDark ? 'bg-dark text-light' : 'bg-light text-dark';
        nav.className = isDark
            ? 'navbar navbar-dark bg-black border-bottom border-secondary px-4'
            : 'navbar navbar-light bg-white border-bottom border-light-subtle px-4';
        icon.className = isDark ? 'bi bi-sun-fill' : 'bi bi-moon-fill';

        document.querySelectorAll('.form-control.bg-dark, .form-control.bg-white').forEach(el => {
            el.classList.toggle('bg-dark', isDark);
            el.classList.toggle('text-light', isDark);
            el.classList.toggle('bg-white', !isDark);
            el.classList.toggle('text-dark', !isDark);
            el.classList.toggle('border-secondary', isDark);
            el.classList.toggle('border-light-subtle', !isDark);
        });
        document.querySelectorAll('.card.bg-dark, .card.bg-white').forEach(el => {
            el.classList.toggle('bg-dark', isDark);
            el.classList.toggle('bg-white', !isDark);
            el.classList.toggle('border-secondary', isDark);
            el.classList.toggle('border-light-subtle', !isDark);
        });
        document.querySelectorAll('.card-header.border-secondary, .card-header.border-light-subtle').forEach(el => {
            el.classList.toggle('border-secondary', isDark);
            el.classList.toggle('border-light-subtle', !isDark);
        });
        document.querySelectorAll('hr.border-secondary, hr.border-light-subtle').forEach(el => {
            el.classList.toggle('border-secondary', isDark);
            el.classList.toggle('border-light-subtle', !isDark);
        });
        document.querySelectorAll('.indicator-panel').forEach(el => {
            el.style.background = isDark ? '#1e222d' : '#f8f9fa';
        });

        // TradingView 차트 테마 업데이트
        if (typeof mainChart !== 'undefined' && mainChart) {
            const chartTheme = {
                layout: { background: { color: isDark ? '#131722' : '#ffffff' }, textColor: isDark ? '#d1d4dc' : '#191919' },
                grid: { vertLines: { color: isDark ? '#1e222d' : '#f0f3fa' }, horzLines: { color: isDark ? '#1e222d' : '#f0f3fa' } },
                rightPriceScale: { borderColor: isDark ? '#2a2e39' : '#d1d4dc' },
                timeScale: { borderColor: isDark ? '#2a2e39' : '#d1d4dc' },
            };
            mainChart.applyOptions(chartTheme);
            if (typeof volumeChart !== 'undefined' && volumeChart) {
                volumeChart.applyOptions(chartTheme);
            }
        }

        // MA 레이블 색상: 라이트 모드에서 가독성 개선 (노랑/하늘색/초록 → 진한 색)
        const ma5Label = document.querySelector('label[for="chkMA5"]');
        const ma20Label = document.querySelector('label[for="chkMA20"]');
        const ma50Label = document.querySelector('label[for="chkMA50"]');
        const bbLabel = document.querySelector('label[for="chkBollinger"]');
        if (ma5Label) ma5Label.style.color = isDark ? '#ffeb3b' : '#b8860b';
        if (ma20Label) ma20Label.style.color = isDark ? '#4fc3f7' : '#0277bd';
        if (ma50Label) ma50Label.style.color = isDark ? '#ff9800' : '#e65100';
        if (bbLabel) bbLabel.style.color = isDark ? '#4caf50' : '#2e7d32';

        // 종합 매매 분석 헤더 색상
        const tradingHeader = document.querySelector('#tradingAnalysisPanel .card-header span.fw-semibold');
        if (tradingHeader) tradingHeader.style.color = isDark ? '#ffc107' : '#b8860b';

        // 차트 로딩 텍스트 색상
        const chartLoadingText = document.querySelector('#chartLoading .text-center');
        if (chartLoadingText) {
            chartLoadingText.classList.toggle('text-light', isDark);
            chartLoadingText.classList.toggle('text-dark', !isDark);
        }

        // MA 현재값 패널 재렌더링 (테마 반영)
        if (typeof updateMAValues === 'function') updateMAValues();
        if (typeof analyzeTradingSignal === 'function') analyzeTradingSignal();

        const qsr = document.getElementById('quickSearchResults');
        if (qsr) {
            qsr.classList.toggle('bg-dark', isDark);
            qsr.classList.toggle('bg-white', !isDark);
            qsr.classList.toggle('border-secondary', isDark);
            qsr.classList.toggle('border-light-subtle', !isDark);
        }

        localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
        applyTheme(getStoredTheme() === 'dark' ? 'light' : 'dark');
    }

    (function() { applyTheme(getStoredTheme()); })();
</script>
<script th:src="@{/js/chart.js(v=20260407)}"></script>
<script th:inline="javascript">
    const symbol = /*[[${symbol}]]*/ '005930';
    document.addEventListener('DOMContentLoaded', function() { initChart(symbol); });
</script>
</body>
</html>
